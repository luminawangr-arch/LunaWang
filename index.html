<section id="experience"><div class="wrap reveal">
  <div class="sec-label">Experience</div>
  <h2 class="sec-title">Research, hands-on</h2>
  <div class="tl" id="tl"></div>
</div></section>

<section id="projects"><div class="wrap reveal">
  <div class="sec-label">Projects</div>
  <h2 class="sec-title">Things I built</h2>
  <div id="projWrap"></div>
</div></section>

<section id="skills"><div class="wrap reveal">
  <div class="sec-label">Skills</div>
  <h2 class="sec-title">Toolkit</h2>
  <div class="skill-grid" id="skillGrid"></div>
</div></section>

<section id="contact"><div class="wrap reveal">
  <div class="sec-label">Contact</div>
  <p class="contact-line">Let's talk — <a id="emailLine"></a></p>
  <div class="contact-links" id="contactLinks"></div>
</div></section>

<footer id="footer"></footer>

<script>
const D=DATA, $=id=>document.getElementById(id);
(function render(){
  const parts=D.name.trim().split(" ");
  $('brand').innerHTML=parts.slice(0,-1).join(" ").toUpperCase()+"&nbsp;<b>"+parts.slice(-1)[0].toUpperCase()+"</b>";
  $('eyebrow').textContent=D.eyebrow;
  $('headline').innerHTML=D.headline;
  $('lead').textContent=D.lead;
  $('heroTags').innerHTML=D.heroTags.join(' <span>·</span> ');
  $('aboutTitle').textContent=D.aboutTitle;
  $('aboutBody').innerHTML=D.about.map(p=>`<p>${p}</p>`).join('');
  $('facts').innerHTML=D.facts.map(([k,v])=>`<div class="fact"><span class="k">${k}</span><span class="v">${v}</span></div>`).join('');

  $('tl').innerHTML=D.experience.map(e=>`
    <div class="tl-item ${e.past?'past':''}">
      <div class="tl-top"><div class="tl-org">${e.org}</div><div class="tl-date">${e.date}</div></div>
      <div class="tl-role">${e.role}</div>
      <ul>${e.points.map(p=>`<li>${p}</li>`).join('')}</ul>
    </div>`).join('');

  $('projWrap').innerHTML=D.projects.map(p=>{
    const flow=p.flow?`
      <div class="arch"><div class="arch-cap">System Flow</div>
        <div class="flow">${p.flow.map((n,i)=>`
          <div class="node"><div class="n-ttl">${n[0]}</div><div class="n-sub">${n[1]}</div></div>
          ${i<p.flow.length-1?'<div class="arrow">→</div>':''}`).join('')}</div>
        ${p.flowNote?`<div class="ph-note">${p.flowNote}</div>`:''}
      </div>`:'';
    const carId='car-'+Math.random().toString(36).slice(2,8);
    const shots=(p.shots&&p.shots.length)?`
      <div class="shots"><div class="shots-cap">Screenshots</div>
        <div class="carousel" id="${carId}">
          <div class="car-count"><span class="car-now">1</span> / ${p.shots.length}</div>
          <div class="car-stage">
            ${p.shots.map((s,i)=>`<img src="${s[0]}" alt="${s[1]}" class="${i===0?'active':''}" loading="lazy">`).join('')}
          </div>
          <button class="car-nav car-prev" data-car="${carId}" data-dir="-1">&#8249;</button>
          <button class="car-nav car-next" data-car="${carId}" data-dir="1">&#8250;</button>
          <div class="car-cap">${p.shots[0][1]}</div>
          <div class="car-dots">
            ${p.shots.map((s,i)=>`<button class="car-dot ${i===0?'active':''}" data-car="${carId}" data-idx="${i}"></button>`).join('')}
          </div>
        </div>
      </div>`:'';
    const links=(p.links&&p.links.length)?`
      <div class="proj-links">${p.links.map(l=>l.url
        ?`<a href="${l.url}" target="_blank" rel="noopener">${l.label}</a>`
        :`<a href="#" class="disabled">${l.label}</a>`).join('')}</div>`:'';
    return `<div class="proj">
      <div class="proj-head"><span class="proj-flag">${p.flag}</span><h3>${p.title}</h3></div>
      <div class="proj-desc">${p.desc.map(d=>`<p>${d}</p>`).join('')}</div>
      <div class="tags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      ${flow}${shots}${links}</div>`;
  }).join('');

  $('skillGrid').innerHTML=D.skills.map(([h,items])=>`
    <div class="skill-card"><h4>${h}</h4>
      <div class="items">${items.map(i=>`<span>${i}</span>`).join('')}</div></div>`).join('');

  const mail="mailto:"+D.email;
  $('emailLine').href=mail; $('emailLine').textContent=D.email;
  let cl=[`<a href="${mail}">Email</a>`,`<a href="#" id="cvBtn2">Download CV</a>`];
  if(D.linkedin) cl.push(`<a href="${D.linkedin}" target="_blank" rel="noopener">LinkedIn</a>`);
  if(D.github)   cl.push(`<a href="${D.github}" target="_blank" rel="noopener">GitHub</a>`);
  $('contactLinks').innerHTML=cl.join('');
  $('footer').textContent="© "+new Date().getFullYear()+" "+D.name+" · Built and designed independently";

  function cvHandler(e){
    if(D.cvFile)return;
    e.preventDefault();
    alert('To enable the CV download:\n\n1. Export your résumé as a PDF.\n2. Put it in the same folder as this file.\n3. Set  cvFile: "YourFile.pdf"  in the DATA block at the top.');
  }
  ['cvBtn','cvBtn2'].forEach(id=>{const b=$(id);if(!b)return;
    if(D.cvFile){b.setAttribute('href',D.cvFile);b.setAttribute('download','');}
    else b.addEventListener('click',cvHandler);});
})();

const io=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target)}})},{threshold:.12});
document.querySelectorAll('.reveal').forEach(el=>io.observe(el));

(function(){
  const c=$('pulse');if(!c)return;
  const reduce=window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  const ctx=c.getContext('2d');let w,h,t=0;
  function size(){w=c.width=c.offsetWidth*devicePixelRatio;h=c.height=c.offsetHeight*devicePixelRatio;}
  size();window.addEventListener('resize',size);
  const lines=[{seed:0.0,amp:0.20,speed:0.6,color:'195,131,128',alpha:0.50},
               {seed:1.7,amp:0.13,speed:0.9,color:'156,113,100',alpha:0.42},
               {seed:3.4,amp:0.08,speed:1.3,color:'87,92,52',alpha:0.30}];
  function noise(x,s){return Math.sin(x*1.7+s)*0.6+Math.sin(x*0.6+s*2.1)*0.4+Math.sin(x*3.1+s*0.7)*0.18;}
  function draw(){
    ctx.clearRect(0,0,w,h);
    lines.forEach(L=>{ctx.beginPath();const mid=h*0.62,step=Math.max(6,w/220);
      for(let x=0;x<=w;x+=step){const px=x/w*8,y=mid+noise(px+t*L.speed,L.seed)*h*L.amp;x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
      ctx.strokeStyle='rgba('+L.color+','+L.alpha+')';ctx.lineWidth=1.4*devicePixelRatio;ctx.stroke();});
    if(!reduce){t+=0.006;requestAnimationFrame(draw);}
  }
  draw();
})();

/* ---- project screenshots carousel ---- */
function carGo(id,target){
  const car=document.getElementById(id);if(!car)return;
  const imgs=car.querySelectorAll('.car-stage img');
  const dots=car.querySelectorAll('.car-dot');
  const n=imgs.length;
  let cur=0;imgs.forEach((im,i)=>{if(im.classList.contains('active'))cur=i;});
  let next=(target+n)%n;
  imgs[cur].classList.remove('active');dots[cur].classList.remove('active');
  imgs[next].classList.add('active');dots[next].classList.add('active');
  car.querySelector('.car-now').textContent=next+1;
  car.querySelector('.car-cap').textContent=imgs[next].getAttribute('alt');
}
document.addEventListener('click',e=>{
  const nav=e.target.closest('.car-nav');
  if(nav){const car=document.getElementById(nav.dataset.car);
    const imgs=car.querySelectorAll('.car-stage img');let cur=0;
    imgs.forEach((im,i)=>{if(im.classList.contains('active'))cur=i;});
    carGo(nav.dataset.car,cur+parseInt(nav.dataset.dir));return;}
  const dot=e.target.closest('.car-dot');
  if(dot){carGo(dot.dataset.car,parseInt(dot.dataset.idx));}
});
</script>
</body>
</html>
